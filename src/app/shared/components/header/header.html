<header [class.scrolled]="isScrolled()">
  <div class="container nav-inner">

    <!-- Logo -->
    <a class="logo" routerLink="/" aria-label="AyurStore Home">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <ellipse cx="18" cy="14" rx="9" ry="13" fill="rgba(61,139,61,0.15)" stroke="#2d6a2d" stroke-width="1.5"/>
        <path d="M18 27 C18 20, 9 16, 9 10" stroke="#2d6a2d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M18 27 C18 20, 27 16, 27 10" stroke="#3d8b3d" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <line x1="18" y1="14" x2="18" y2="30" stroke="#bf6e0e" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="18" cy="10" r="3" fill="#3d8b3d" opacity="0.7"/>
      </svg>
      <span class="logo-text">Ayur<span class="logo-accent">Store</span></span>
    </a>

    <!-- Desktop Nav -->
    <nav class="nav-links" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a href="#about">About Us</a>
      <a href="#contact">Contact</a>
    </nav>

    <!-- Actions -->
    <div class="nav-actions">
      <!-- <button class="btn-ghost">Sign In</button> -->
      <a routerLink="/products" class="btn-primary">Shop Now</a>
    </div>

    <!-- Mobile hamburger -->
    <button class="hamburger" (click)="toggleMenu()"
            [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="mobile-menu">
      <a routerLink="/" (click)="toggleMenu()">Home</a>
      <a routerLink="/products" (click)="toggleMenu()">Products</a>
      <a href="#about" (click)="toggleMenu()">About Us</a>
      <a href="#contact" (click)="toggleMenu()">Contact</a>
      <a routerLink="/products" class="btn-primary mobile-cta" (click)="toggleMenu()">Shop Now</a>
    </div>
  }
</header>
